name: Test (spec-driven)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec:
    name: Spec coverage gate (apps/insure)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build @platform/spec-test (dist is gitignored)
        working-directory: packages/spec-test
        run: npm run build
      - name: Resolve Playwright version
        id: pw
        working-directory: apps/insure
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/insure
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/insure/.next/cache
          key: nextjs-insure-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/insure/**/*.[jt]s', 'apps/insure/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-insure-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      # AI extraction is mocked in e2e, so no ANTHROPIC_API_KEY is needed here.
      - name: Spec gate (build + unit + e2e + coverage)
        working-directory: apps/insure
        run: npm run test:spec
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spec-coverage
          path: apps/insure/spec-coverage.md
          if-no-files-found: warn
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'apps/insure/spec-coverage.md';
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
