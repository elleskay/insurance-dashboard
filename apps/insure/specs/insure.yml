app: insure
version: 1

# CoverLens SG: a Singapore insurance policy checker.
# Upload a personal insurance policy PDF (read entirely in the browser), and the
# app returns two things per policy: a plain-language summary of what you are
# getting, and a curated checklist of the fine print to watch for (waiting and
# survival periods, pre-existing exclusions, co-payment, exclusions, claim
# limits, premium guarantee, free-look period).
#
# Safety stance: every fine-print finding shown is grounded in a verbatim quote
# from the uploaded document. A LangGraph self-correction loop re-drafts, then
# demotes to "not stated", anything it cannot quote from the source, so the app
# never invents an exclusion or limit. Document text is sent to an AI service to
# read it (disclosed); nothing is stored, there is no database.
# Estimates only, dated, not financial advice.

requirements:
  # ---------------------------------------------------------------------------
  # GROUNDING: the deterministic core of the checker (Vitest)
  # ---------------------------------------------------------------------------
  - id: INSURE-CHECK-001
    title: A fine-print finding is grounded only if its quote appears in the document
    category: data
    severity: critical
    given: Draft findings where one cites a quote that is not present in the policy document text and one cites a quote that is
    when: The grounding check runs against the source text
    then: The finding whose quote is absent from the source is flagged as ungrounded while the finding whose quote is present passes
    tags: [checker, grounding, safety]

  - id: INSURE-CHECK-002
    title: The checker revises ungrounded drafts then demotes anything it cannot quote
    category: data
    severity: critical
    given: A draft with a finding whose quote cannot be found in the document
    when: The graph decides whether to revise and then summarises the result
    then: It routes back to a revision while ungrounded findings remain and attempts are under the cap, and on finalising it demotes the unquotable finding to "not stated" and marks the result as needing review rather than showing the invented finding
    tags: [checker, self-correction, loop, safety]

  - id: INSURE-CHECK-003
    title: Every checked policy reports the full curated watch-out checklist
    category: data
    severity: high
    given: An AI draft that only returned findings for some of the curated watch-out items
    when: The result is summarised
    then: The policy's checklist contains every curated item in a stable order, each marked either found (with detail) or not stated, so no item silently disappears
    tags: [checker, checklist, completeness]

  # ---------------------------------------------------------------------------
  # UPLOAD (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-UPLOAD-001
    title: The page offers PDF upload with a note on how the document is handled
    category: ui
    severity: high
    given: A visitor on the home page
    when: They look at the upload area
    then: A file input that accepts one or more PDFs is shown, alongside a clear note explaining how the document is handled
    tags: [upload, privacy]

  - id: INSURE-UPLOAD-002
    title: Uploading a policy PDF produces a summary and a fine-print checklist with no manual entry
    category: functional
    severity: critical
    given: A visitor with a policy PDF and an empty page
    when: They upload the PDF
    then: The app reads the document text in the browser, sends it to the AI checker service, and shows the returned policy with a plain-language summary and the fine-print checklist, without the visitor typing any policy values
    tags: [upload, checker, ai, journey]

  # ---------------------------------------------------------------------------
  # WHAT YOU ARE GETTING + WHAT TO WATCH FOR (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-SUMMARY-001
    title: Each checked policy shows a plain-language summary of what it covers
    category: ui
    severity: critical
    given: A policy that has been checked
    when: Its card renders
    then: A plain-language summary of what the policy gives you is shown, along with the insurer and plan name
    tags: [summary]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-FINEPRINT-001
    title: Each checked policy shows the curated watch-out checklist with a status per item
    category: functional
    severity: critical
    given: A policy that has been checked
    when: Its card renders
    then: The curated watch-out items (such as waiting period, pre-existing conditions, exclusions, co-payment, claim limits, free-look) are each shown marked as found or not stated
    tags: [fineprint, checklist]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-FINEPRINT-002
    title: A found watch-out shows the supporting quote from the user's document
    category: functional
    severity: high
    given: A checked policy with a watch-out item that was found in the document
    when: The visitor views that found item
    then: The supporting verbatim quote from their own document is shown for it, so the finding can be traced back to the source rather than taken on trust
    tags: [fineprint, grounding, trust]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-REVIEW-001
    title: A checked policy can be removed
    category: functional
    severity: medium
    given: A policy already shown on the page
    when: The visitor removes it
    then: It disappears from the list
    tags: [review]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-EMPTY-001
    title: An empty state guides the user before any policy is checked
    category: ui
    severity: medium
    given: A first visit with nothing uploaded
    when: The page renders
    then: A helpful empty state invites the visitor to upload a policy document instead of showing a blank page
    tags: [empty-state]

  # ---------------------------------------------------------------------------
  # TRUST + SECURITY (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-TRUST-001
    title: A not-advice disclaimer with a reviewed date is present
    category: ui
    severity: high
    given: Any page of the app
    when: It renders
    then: A visible disclaimer states this is a plain-language reading of the document, not financial advice, tells the user to confirm against their actual policy wording, and shows a last-reviewed date
    tags: [trust, disclaimer]

  - id: INSURE-SEC-001
    title: The app is usable without authentication
    category: security
    severity: high
    given: A visitor with no session
    when: They open the app
    then: It returns 200 and is usable with no redirect to a login page
    tags: [auth, public]

  - id: INSURE-SEC-002
    title: The app discloses that document text is sent to an AI service
    category: security
    severity: critical
    given: A visitor looking at the upload area before uploading
    when: They read the privacy note
    then: It clearly states that the document text is sent to an AI service to read the policy (it does not claim the document never leaves the browser)
    tags: [privacy, ai, transparency]

  # ---------------------------------------------------------------------------
  # ACCESSIBILITY (Playwright + axe)
  # ---------------------------------------------------------------------------
  - id: INSURE-A11Y-001
    title: The checked-policy view has no critical accessibility violations
    category: a11y
    severity: high
    given: The page with a policy checked
    when: An automated accessibility scan runs
    then: No critical or serious violations are reported
    tags: [a11y, axe]

  - id: INSURE-A11Y-002
    title: The supporting-quote disclosure is operable by keyboard
    category: a11y
    severity: medium
    given: A keyboard-only visitor on a checked policy with a found watch-out
    when: They open the supporting-quote disclosure for that item
    then: They can reveal the quote without a pointer
    tags: [a11y, keyboard]
    depends_on: [INSURE-FINEPRINT-002]

  # ---------------------------------------------------------------------------
  # JOURNEY (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-JOURNEY-001
    title: Upload a policy and see its summary plus a grounded fine-print checklist
    category: functional
    severity: critical
    given: A new visitor
    when: They upload a policy document
    then: The page shows the plain-language summary, the watch-out checklist with a found item, and that found item's supporting quote from the document, all in one unbroken flow
    tags: [journey, e2e]
    depends_on: [INSURE-UPLOAD-002, INSURE-SUMMARY-001, INSURE-FINEPRINT-002]
