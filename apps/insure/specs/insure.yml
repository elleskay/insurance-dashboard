app: insure
version: 1

# Insurance coverage overview dashboard for Singapore.
# Upload personal insurance policy PDFs (parsed entirely in the browser), review
# the extracted figures, and see coverage by category with an adequacy view
# against the LIA / MoneySense rules of thumb (death/TPD ~9x annual income,
# critical illness ~4x, protection premiums ~15% of take-home pay).
#
# Privacy + safety stance: documents never leave the device (client-side only,
# no server upload, no database). Extraction is best-effort and user-verified.
# Estimates only, dated, not financial advice; benchmarks are cited.

requirements:
  # ---------------------------------------------------------------------------
  # DATA: extractor + dashboard math (Vitest)
  # ---------------------------------------------------------------------------
  - id: INSURE-DATA-001
    title: AI extraction output is normalised into valid policy fields
    category: data
    severity: critical
    given: Raw policy objects returned by the AI extractor (a known category, a sum assured as a string, a monthly premium amount)
    when: normalizePolicies is called on them
    then: It maps the category to a known category, coerces the sum assured to a number, and annualises the monthly premium
    tags: [extractor, normalize]

  - id: INSURE-DATA-002
    title: Normalisation drops unrecognised or invalid values rather than inventing them
    category: data
    severity: high
    given: Raw AI output with an unknown category and a zero or negative amount
    when: normalizePolicies is called
    then: It returns an undefined category and no numeric amount rather than fabricated values
    tags: [extractor, normalize, safety]

  - id: INSURE-DATA-003
    title: Coverage totals are summed per category
    category: data
    severity: high
    given: Several policies across different categories
    when: sumByCategory is computed
    then: Each category total equals the sum of its policies' sum assured
    tags: [compute]

  - id: INSURE-DATA-004
    title: Adequacy gap is target minus covered, never negative, with a status
    category: data
    severity: critical
    given: An annual income, a coverage amount and a benchmark multiple (9x for death/TPD, 4x for critical illness)
    when: adequacy is computed
    then: target is income times the multiple, gap is max(0, target minus covered), and status reflects whether the need is met, partially met, or low
    tags: [compute, adequacy]

  - id: INSURE-DATA-005
    title: Premium share of income is computed and flagged against the guideline
    category: data
    severity: medium
    given: A total annual premium and an annual income
    when: premiumShareOfIncome is computed
    then: It returns the percentage of income and flags when it exceeds the ~15% protection guideline
    tags: [compute, premium]

  # ---------------------------------------------------------------------------
  # UPLOAD + REVIEW (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-UPLOAD-001
    title: The page offers PDF upload with a note on how documents are handled
    category: ui
    severity: high
    given: A visitor on the dashboard
    when: They look at the upload area
    then: A file input that accepts one or more PDFs is shown, alongside a clear note explaining how the document is handled
    tags: [upload, privacy]

  - id: INSURE-UPLOAD-002
    title: Uploading a policy PDF builds the summary with no manual data entry
    category: functional
    severity: critical
    given: A visitor with a policy PDF and an empty dashboard
    when: They upload the PDF
    then: The app reads the document text in the browser, sends it to the AI extraction service, and adds the returned policy (category, sum assured, premium) to the dashboard automatically, without the visitor typing any policy values
    tags: [upload, extract, ai, journey]

  - id: INSURE-REVIEW-001
    title: An extracted policy can be corrected inline without re-entering it
    category: functional
    severity: critical
    given: A policy that was added from an uploaded document
    when: The visitor edits one of its fields (for example the sum assured) in the policy list
    then: Only that field changes and the dashboard totals update, with the rest of the policy preserved
    tags: [review, policies]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-REVIEW-002
    title: A policy can be removed
    category: functional
    severity: medium
    given: A policy already on the dashboard
    when: The visitor removes it
    then: It disappears from the policy list and the totals update
    tags: [review, policies]
    depends_on: [INSURE-UPLOAD-002]

  # ---------------------------------------------------------------------------
  # DASHBOARD (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-DASH-001
    title: Coverage by category is shown with totals
    category: ui
    severity: critical
    given: At least one policy added
    when: The dashboard renders
    then: Coverage-by-category cards show the categories (hospitalisation, life, critical illness, disability income, personal accident) with their summed cover
    tags: [dashboard]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-DASH-002
    title: Adequacy shows death/TPD vs 9x and critical illness vs 4x of income
    category: functional
    severity: critical
    given: Life and critical-illness cover on the dashboard and an optional annual income provided
    when: The adequacy section renders
    then: It shows the target, the covered amount, and the gap (or met status) for death/TPD against 9x income and critical illness against 4x income
    tags: [dashboard, adequacy]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-DASH-003
    title: Total premium and its share of income are shown against the guideline
    category: ui
    severity: high
    given: Policies with premiums and an optional annual income
    when: The premium panel renders
    then: It shows the total annual premium and its percentage of income, referencing the ~15% guideline
    tags: [dashboard, premium]
    depends_on: [INSURE-UPLOAD-002]

  - id: INSURE-DASH-004
    title: An empty state guides the user before any policy exists
    category: ui
    severity: medium
    given: A first visit with no policies
    when: The dashboard renders
    then: A helpful empty state invites the visitor to upload a policy document instead of showing blank or zeroed charts
    tags: [dashboard, empty-state]

  # ---------------------------------------------------------------------------
  # ADVISOR: grounded, self-correcting LangGraph recommendations
  # (Vitest for the grounding logic, Playwright for the panel + journey)
  # ---------------------------------------------------------------------------
  - id: INSURE-ADVISOR-001
    title: Every recommendation is grounded in the computed coverage gaps
    category: data
    severity: critical
    given: Recommendations where one cites a dollar gap that does not match the figure computed from the policies and income
    when: The grounding check runs against the computed facts
    then: The recommendation citing the wrong figure is flagged as ungrounded while correctly cited ones pass
    tags: [advisor, grounding, safety]

  - id: INSURE-ADVISOR-002
    title: The advisor revises ungrounded drafts then flags anything it cannot verify
    category: data
    severity: high
    given: A draft that still has grounding issues
    when: The graph decides whether to revise and then summarises the result
    then: It routes back to a revision while issues remain and attempts are under the cap, and on finalising it drops unverifiable recommendations and marks the result as needing review
    tags: [advisor, self-correction, loop]

  - id: INSURE-ADVISOR-003
    title: A user can request advice and see recommendations tied to their actual gaps
    category: functional
    severity: critical
    given: A dashboard with policies and an annual income entered
    when: The user requests personalised advice
    then: The app calls the advisor service and shows recommendations that reference the user's real coverage gaps, in one flow from upload to advice
    tags: [advisor, journey, e2e]
    depends_on: [INSURE-UPLOAD-002, INSURE-DASH-002]

  - id: INSURE-ADVISOR-004
    title: Advice that could not be verified is flagged for review, not shown as certain
    category: ui
    severity: high
    given: An advice response where some suggestions were set aside as unverifiable
    when: The advice panel renders
    then: A visible review note tells the user some suggestions need checking, rather than presenting every suggestion as confirmed
    tags: [advisor, trust, review]

  # ---------------------------------------------------------------------------
  # TRUST + SAFETY (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-TRUST-001
    title: A not-advice disclaimer with cited benchmarks and a date is present
    category: ui
    severity: high
    given: Any page of the app
    when: It renders
    then: A visible disclaimer states this is an estimate and not financial advice, cites the LIA / MoneySense benchmarks, and shows a last-reviewed date
    tags: [trust, disclaimer]

  - id: INSURE-SEC-001
    title: The app is usable without authentication
    category: security
    severity: high
    given: A visitor with no session
    when: They open the app
    then: It returns 200 and is usable with no redirect to a login page
    tags: [auth, public]

  - id: INSURE-SEC-002
    title: The app discloses that document text is sent to an AI service
    category: security
    severity: critical
    given: A visitor looking at the upload area before uploading
    when: They read the privacy note
    then: It clearly states that the document text is sent to an AI service to extract the figures (it does not claim the document never leaves the browser)
    tags: [privacy, ai, transparency]

  # ---------------------------------------------------------------------------
  # ACCESSIBILITY (Playwright + axe)
  # ---------------------------------------------------------------------------
  - id: INSURE-A11Y-001
    title: The dashboard has no critical accessibility violations
    category: a11y
    severity: high
    given: The dashboard with a policy added
    when: An automated accessibility scan runs
    then: No critical or serious violations are reported
    tags: [a11y, axe]

  - id: INSURE-A11Y-002
    title: Adding and editing a policy by hand is operable by keyboard
    category: a11y
    severity: medium
    given: A keyboard-only visitor whose document did not parse
    when: They use the manual fallback to add a policy and edit its fields
    then: They can add and edit a policy without a pointer
    tags: [a11y, keyboard]

  # ---------------------------------------------------------------------------
  # JOURNEY (Playwright)
  # ---------------------------------------------------------------------------
  - id: INSURE-JOURNEY-001
    title: Upload a policy, optionally add income, and see coverage and an adequacy gap
    category: functional
    severity: critical
    given: A new visitor
    when: They upload a life policy document, add a critical-illness policy, and enter their annual income
    then: The dashboard shows coverage by category, the total premium, and an adequacy comparison with a gap or met status, all in one unbroken flow
    tags: [journey, e2e]
    depends_on: [INSURE-UPLOAD-002, INSURE-DASH-001, INSURE-DASH-002]
